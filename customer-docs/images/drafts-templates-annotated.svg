<text x="808" y="374" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0f172a">Failures usually start with email</text>
<text x="808" y="391" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0f172a">connection</text>
<circle cx="550" cy="420" r="18" fill="#ea580c" fill-opacity="0.12" stroke="#ea580c" stroke-width="3" />
