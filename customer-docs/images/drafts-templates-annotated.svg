<text x="54" y="318" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500" fill="#0f172a">Templates</text>
<rect x="260" y="128" width="280" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" />
<rect x="260" y="128" width="5" height="92" rx="3" fill="#2563eb" />
<text x="282" y="158" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Needs review</text>
<text x="282" y="184" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">AI drafts should be checked</text>
<text x="282" y="202" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">before sending</text>
<rect x="570" y="128" width="280" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" />
<rect x="570" y="128" width="5" height="92" rx="3" fill="#2563eb" />
<text x="592" y="158" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Reprompt</text>
<text x="592" y="184" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Ask for shorter, warmer, or</text>
<text x="592" y="202" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">more detailed copy</text>
<rect x="260" y="254" width="280" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" />
<rect x="260" y="254" width="5" height="92" rx="3" fill="#2563eb" />
<text x="282" y="284" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Send or schedule</text>
<text x="282" y="310" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Confirm recipients, links,</text>
<text x="282" y="328" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">and timing</text>
<rect x="570" y="254" width="280" height="92" rx="10" fill="#ffffff" stroke="#cbd5e1" />
<rect x="570" y="254" width="5" height="92" rx="3" fill="#2563eb" />
<text x="592" y="284" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Failed drafts</text>
<text x="592" y="310" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Reconnect email, retry, or</text>
<text x="592" y="328" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">report the issue</text>
<rect x="260" y="382" width="590" height="70" rx="10" fill="#ffffff" stroke="#cbd5e1" />
<rect x="260" y="382" width="5" height="70" rx="3" fill="#2563eb" />
<text x="282" y="412" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">Templates</text>
<text x="282" y="438" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">Set reusable follow-up structure and team tone</text>
<circle cx="406" cy="166" r="18" fill="#ea580c" fill-opacity="0.12" stroke="#ea580c" stroke-width="3" />
