<rect x="742" y="488" width="262" height="44" rx="8" fill="#ffffff" stroke="#ea580c" />
<text x="756" y="506" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0f172a">Templates shape future drafts</text>
